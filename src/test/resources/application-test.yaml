ktor:
  application:
    modules:
      - me.aquitano.health.api.ApplicationKt.module
  deployment:
    port: 0

aqtHealth:
  database:
    jdbcUrl: "$AQT_HEALTH_TEST_JDBC_URL:jdbc:postgresql://localhost:5432/aqt_health_test"
    driver: "$AQT_HEALTH_TEST_DB_DRIVER:org.postgresql.Driver"
    user: "$AQT_HEALTH_TEST_DB_USER:aqt_health"
    password: "$AQT_HEALTH_TEST_DB_PASSWORD:aqt_health"
    maxPoolSize: "$AQT_HEALTH_TEST_DB_MAX_POOL_SIZE:10"
  auth:
    bootstrapClientName: "test-client"
    bootstrapApiKey: "test-key"
