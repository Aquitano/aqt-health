ktor:
  application:
    modules:
      - me.aquitano.health.api.ApplicationKt.module
  deployment:
    port: "$PORT:8080"

aqtHealth:
  database:
    jdbcUrl: "$AQT_HEALTH_JDBC_URL:jdbc:postgresql://localhost:5432/aqt_health"
    driver: "$AQT_HEALTH_DB_DRIVER:org.postgresql.Driver"
    user: "$AQT_HEALTH_DB_USER:aqt_health"
    password: "$AQT_HEALTH_DB_PASSWORD:aqt_health"
    maxPoolSize: "$AQT_HEALTH_DB_MAX_POOL_SIZE:10"
  auth:
    bootstrapClientName: "$AQT_HEALTH_BOOTSTRAP_CLIENT_NAME:local-admin"
    bootstrapApiKey: "$AQT_HEALTH_BOOTSTRAP_API_KEY:"
  googleHealth:
    clientId: "$AQT_HEALTH_GOOGLE_CLIENT_ID:"
    clientSecret: "$AQT_HEALTH_GOOGLE_CLIENT_SECRET:"
    redirectUri: "$AQT_HEALTH_GOOGLE_REDIRECT_URI:"
    tokenEncryptionKey: "$AQT_HEALTH_GOOGLE_TOKEN_ENCRYPTION_KEY:"
    apiBaseUrl: "$AQT_HEALTH_GOOGLE_API_BASE_URL:https://health.googleapis.com"
    oauthTokenUrl: "$AQT_HEALTH_GOOGLE_OAUTH_TOKEN_URL:https://oauth2.googleapis.com/token"
    oauthAuthUrl: "$AQT_HEALTH_GOOGLE_OAUTH_AUTH_URL:https://accounts.google.com/o/oauth2/v2/auth"
  withings:
    clientId: "$AQT_HEALTH_WITHINGS_CLIENT_ID:"
    clientSecret: "$AQT_HEALTH_WITHINGS_CLIENT_SECRET:"
    redirectUri: "$AQT_HEALTH_WITHINGS_REDIRECT_URI:http://localhost:8080/oauth/withings/callback"
    tokenEncryptionKey: "$AQT_HEALTH_WITHINGS_TOKEN_ENCRYPTION_KEY:"
    apiBaseUrl: "$AQT_HEALTH_WITHINGS_API_BASE_URL:https://wbsapi.withings.net"
    oauthTokenUrl: "$AQT_HEALTH_WITHINGS_OAUTH_TOKEN_URL:https://wbsapi.withings.net/v2/oauth2"
    oauthAuthUrl: "$AQT_HEALTH_WITHINGS_OAUTH_AUTH_URL:https://account.withings.com/oauth2_user/authorize2"
  cors:
    origins: "$AQT_HEALTH_CORS_ORIGINS:http://localhost:3000"
  openObserve:
    url: "$OPENOBSERVE_URL:"
    user: "$OPENOBSERVE_USER:"
    password: "$OPENOBSERVE_PASSWORD:"