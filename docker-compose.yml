services:
  postgres:
    image: postgres:17
    ports:
      - "${AQT_HEALTH_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aqt_health}
      POSTGRES_USER: ${AQT_HEALTH_DB_USER:-aqt_health}
      POSTGRES_PASSWORD: ${AQT_HEALTH_DB_PASSWORD:-aqt_health}
    volumes:
      - aqt_health_pgdata:/var/lib/postgresql/data

volumes:
  aqt_health_pgdata:
