version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Frontend is on bun; Dependabot reads package.json under the npm ecosystem.
  # bun.lock parsing is recent — verify PRs appear, or move the frontend to Renovate if not.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
