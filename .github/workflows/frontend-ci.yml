name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main

defaults:
  run:
    working-directory: frontend

jobs:
  frontend:
    name: lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
